<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Encryptor Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; max-width: 700px; margin: 0 auto; background: #f0f2f5; line-height: 1.6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 12px; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-green { background: #28a745; }
        .btn-blue { background: #007bff; }
        .status { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .status-idle { color: #666; }
        .status-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Global Settings</h2>
        <label>Set Access Password (Used for all steps):</label>
        <input type="password" id="password" placeholder="Enter a strong password">
    </div>

    <div class="card">
        <h2>Step 1: Create Locked Data Bundle</h2>
        <label>Secret PDF Folder Name:</label>
        <input type="text" id="folderName" value="pdfs">
        
        <label>Select physics_data.json:</label>
        <input type="file" id="fileInput">

        <button class="btn-green" onclick="processAndEncrypt()">Generate payload.enc</button>
        <div id="status1" class="status"></div>
    </div>

    <div class="card">
        <h2>Step 2: Encrypt PDFs (Individual)</h2>
        <p><small>Encrypts files and downloads them one by one.</small></p>
        <input type="file" id="pdfFiles" multiple>
        <button class="btn-blue" onclick="encryptPDFFiles()">Encrypt & Download Files</button>
    </div>

    <div class="card">
        <h2>Step 3: Encrypt PDFs (ZIP Bundle)</h2>
        <p><small>Encrypts files and bundles them into a single .zip archive.</small></p>
        <input type="file" id="pdfFilesZip" multiple>
        <button class="btn-blue" onclick="zipencryptPDFFiles()">Encrypt & Download ZIP</button>
        <div id="status3" class="status"></div>
    </div>

    <script>
        // --- STEP 1: JSON Logic ---
        function processAndEncrypt() {
            const folder = document.getElementById('folderName').value.trim();
            const pass = document.getElementById('password').value;
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status1');

            if (!folder || !pass || !fileInput.files[0]) {
                alert("Please fill in all fields in Step 1 and the Password.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let rawText = e.target.result;
                    if (rawText.charCodeAt(0) === 0xFEFF) rawText = rawText.slice(1);
                    const jsonData = JSON.parse(rawText);

                    const bundle = {
                        secure_folder: folder,
                        data: jsonData
                    };

                    const encrypted = CryptoJS.AES.encrypt(JSON.stringify(bundle), pass).toString();
                    
                    downloadBlob(new Blob([encrypted], {type: "text/plain"}), "payload.enc");
                    status.className = "status status-success";
                    status.innerText = "Success! 'payload.enc' downloaded.";
                } catch (err) {
                    alert("Error parsing JSON file: " + err.message);
                }
            };
            reader.readAsText(fileInput.files[0]);
        }

        // --- STEP 2: Individual PDF Logic ---
        async function encryptPDFFiles() {
            const pass = document.getElementById('password').value;
            const files = document.getElementById('pdfFiles').files;
            if (!pass || files.length === 0) return alert("Enter password and select files for Step 2.");

            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const wa = CryptoJS.lib.WordArray.create(e.target.result);
                    const encrypted = CryptoJS.AES.encrypt(wa, pass).toString();
                    downloadBlob(new Blob([encrypted], {type: "text/plain"}), file.name);
                };
                reader.readAsArrayBuffer(file);
            }
        }

        // --- STEP 3: ZIP Logic ---
        async function zipencryptPDFFiles() {
            const pass = document.getElementById('password').value;
            const files = document.getElementById('pdfFilesZip').files; // Fixed ID
            const status = document.getElementById('status3');
            
            if (!pass) return alert("Please enter a password first.");
            if (files.length === 0) return alert("Please select some PDF files for Step 3.");

            const zip = new JSZip();
            status.innerText = "Processing files... please wait.";

            const filePromises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const wa = CryptoJS.lib.WordArray.create(e.target.result);
                        const encrypted = CryptoJS.AES.encrypt(wa, pass).toString();
                        zip.file(file.name, encrypted);
                        resolve();
                    };
                    reader.readAsArrayBuffer(file);
                });
            });

            await Promise.all(filePromises);
            const content = await zip.generateAsync({ type: "blob" });
            downloadBlob(content, "encrypted_pdfs.zip");

            status.className = "status status-success";
            status.innerText = "Done! ZIP archive downloaded.";
        }

        // Helper function for cleaner downloads
        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const element = document.createElement('a');
            element.href = url;
            element.download = filename;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
